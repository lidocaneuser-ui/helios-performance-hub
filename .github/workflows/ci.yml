name: Helios CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade -r requirements-dev.txt
      - name: Compile
        run: python -m compileall -q helios_performance_hub.py helios_update.py helios_update_worker.py helios_launcher.py helios_release.py helios_core
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Lint critical failures
        run: python -m ruff check --select F,E9 helios_performance_hub.py helios_update.py helios_update_worker.py helios_launcher.py helios_release.py helios_core tests
      - name: Build unsigned validation package
        run: python helios_release.py --mode source --output ci-release
